name: Test & Deploy

on:
  push:
    branches:
    - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Get Python
        uses: actions/setup-python@v6
      
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      
      - name: Run Tests
        run: pytest tests
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: deploy
        env:
          DEPLOY_URL: "https://api.render.com/deploy/srv-d72s7u1r0fns73afkpd0?key=i84-m7zw3KU"
        run: curl "$DEPLOY_URL"